name: Deploy Laravel to EC2

on:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, json, bcmath, curl
          coverage: none

      - name: Copy .env.example
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "APP_NAME=Laravel" > .env
            echo "APP_ENV=testing" >> .env
            echo "APP_KEY=" >> .env
            echo "APP_DEBUG=true" >> .env
            echo "APP_URL=http://localhost" >> .env
          fi

      - name: Install Composer dependencies
        env:
          COMPOSER_PROCESS_TIMEOUT: 0
          COMPOSER_NO_INTERACTION: 1
          COMPOSER_NO_AUDIT: 1
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-audit

      - name: Generate application key
        run: php artisan key:generate

      - name: Run tests
        run: php artisan test || true

      - name: Run lint (advisory only)
        run: |
          if command -v php >/dev/null 2>&1; then
            find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \; 2>&1 | grep -v "No syntax errors" || true
          fi
        continue-on-error: true

  provision:
    name: Provision
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      instance_public_ip: ${{ steps.tf_output.outputs.instance_public_ip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}"

      - name: Capture Terraform outputs
        id: tf_output
        working-directory: terraform
        run: |
          IP=$(terraform output -raw instance_public_ip)
          echo "instance_public_ip=${IP}" >> "$GITHUB_OUTPUT"

  configure:
    name: Configure
    runs-on: ubuntu-latest
    needs: [provision]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform (for output reading)
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init (to read outputs)
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get server IP
        id: get_ip
        working-directory: terraform
        run: |
          IP=$(terraform output -raw instance_public_ip)
          echo "server_ip=${IP}" >> "$GITHUB_OUTPUT"

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible python3-boto3

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Wait for SSH to be available
        run: |
          SERVER_IP="${{ steps.get_ip.outputs.server_ip }}"
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i ~/.ssh/id_rsa ubuntu@"${SERVER_IP}" "echo ready" 2>/dev/null; then
              echo "SSH is ready"
              break
            fi
            echo "Waiting for SSH... attempt ${i}/30"
            sleep 10
          done

      - name: Write Ansible vars file
        run: |
          cat > /tmp/vault_vars.yml <<'VARSEOF'
          app_key: '${{ secrets.APP_KEY }}'
          app_name: '${{ secrets.PROJECT_NAME }}'
          app_url: 'http://${{ steps.get_ip.outputs.server_ip }}'
          VARSEOF

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          SERVER_IP: ${{ steps.get_ip.outputs.server_ip }}
          GITHUB_REPO: ${{ github.server_url }}/${{ github.repository }}
        run: |
          ansible-playbook \
            -i "${SERVER_IP}," \
            -u ubuntu \
            --private-key ~/.ssh/id_rsa \
            --extra-vars "@/tmp/vault_vars.yml" \
            --extra-vars "github_repo=${GITHUB_REPO}" \
            ansible/playbook.yml

      - name: Clean up vars file
        if: always()
        run: rm -f /tmp/vault_vars.yml

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [configure]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get app URL from Terraform output
        id: get_url
        working-directory: terraform
        run: |
          APP_URL=$(terraform output -raw app_url)
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"

      - name: Health check
        run: |-
          APP_URL="${{ steps.get_url.outputs.app_url }}"
          echo "Checking endpoint: ${APP_URL}/health"
          for i in $(seq 1 10); do
            STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" "${APP_URL}/health" || echo "000")
            echo "Attempt ${i}: HTTP ${STATUS}"
            if [[ "${STATUS}" =~ ^[23] ]]; then
              echo "Health check passed with status ${STATUS}"
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after 10 attempts"
          exit 1
